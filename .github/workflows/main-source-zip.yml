name: Build source ZIP on main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ZIP + checksum
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::12}"
          ZIP_NAME="pastechi-${SHORT_SHA}.zip"

          mkdir -p dist
          git archive --format=zip --output "dist/${ZIP_NAME}" HEAD

          cd dist
          sha256sum "${ZIP_NAME}" > SHA256SUMS.txt
          cd -

          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pastechi-main-${{ env.SHORT_SHA }}
          path: dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/${{ env.ZIP_NAME }}
            dist/SHA256SUMS.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: source-main-${{ env.SHORT_SHA }}
          name: Source main ${{ env.SHORT_SHA }}
          files: dist/*
          generate_release_notes: false
          body: |
            Automated source archive for commit `${{ github.sha }}`.
            Verify with `SHA256SUMS.txt` and GitHub artifact attestation.
